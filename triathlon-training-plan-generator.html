      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Standard marathon training plans run 16-20 weeks for most runners. Beginners with a base of 20-25 miles per week should use 18-20 weeks. Runners with a half-marathon base (30+ miles/week) can use 16-18 weeks. Elite-level runners follow year-round periodized plans with specific 12-16 week race-specific blocks. The key constraint is long run buildup: the peak long run (20-22 miles) should be reached 3 weeks before race day, with a full 3-week taper. Rushing the long run buildup increases injury risk significantly \u2014 mileage should not increase more than 10% per week."

      "@type": "Question",
      "name": "What is the 80/20 rule in endurance training?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "The 80/20 rule (polarized training) means 80% of training volume at easy, conversational effort (Zone 1-2) and 20% at moderate-to-hard effort (Zone 3-5). Most self-coached athletes spend too much time in the 'gray zone' (Zone 3 \u2014 comfortably hard) which accumulates fatigue without the aerobic base benefits of Zone 2 or the neuromuscular adaptations of Zone 4-5. Research by Dr. Stephen Seiler on elite endurance athletes consistently shows this distribution. In practice: if you can hold a conversation without pausing, you're in Zone 2. If you're breathing hard but can speak in short sentences, you're in Zone 3 \u2014 too hard for an easy day."
      }
