      "name": "How accurate are the RunBikeCalc calculators?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "RunBikeCalc calculators use validated sports science formulas: the Jack Daniels VDOT system for running pace zones, the 95% of FTP standard for cycling threshold power, and the Karvonen formula for heart rate zones. Results are accurate within \u00b13-5% for most athletes under normal conditions. Individual variation from lab-tested values is expected \u2014 use calculator results as a starting baseline, then adjust based on how you actually feel at those intensities during training. For racing, always verify paces in training before committing to a race plan."

      "@type": "Question",
      "name": "What is the difference between heart rate zones and power zones?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Heart rate zones (typically 5 zones based on max HR or lactate threshold HR) reflect cardiovascular effort \u2014 useful for all endurance activities. Power zones (7 zones based on FTP) measure actual work output in watts \u2014 available only on bikes with power meters. Power zones respond immediately to effort changes; heart rate lags 30-90 seconds. For steady-state riding, both methods produce similar training stress. For intervals, power is more precise. Beginners should start with HR zones (cheaper, sufficient); serious cyclists wanting performance data should invest in a power meter."
      }
    },
    {
      "@type": "Question",
      "name": "How do I find my FTP (Functional Threshold Power)?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "The most common FTP test: warm up 20 minutes, then ride all-out for 20 minutes, take 95% of your average power as your FTP. Alternative: the 8-minute test (2 \u00d7 8 minutes all-out, rest 10 minutes between, take 90% of the higher effort's average power). Ramp tests (increasing power every minute until failure) are popular on smart trainers and typically correlate to within 5-10% of traditional FTP tests. FTP typically improves 10-20% in the first training year and 3-5% annually for experienced athletes. Retest every 6-8 weeks during a training block."
      }
